<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRK Agro App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }
    img.logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      object-fit: cover;
    }
    h1 { font-size: 1.5rem; font-weight: 700; text-align: center; }
    p { font-size: 0.95rem; color: #aaa; text-align: center; max-width: 280px; line-height: 1.5; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #6abf3f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 14px 32px;
      background: #6abf3f;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <h1>BRK Agro</h1>

  <div class="spinner" id="spinner"></div>
  <p id="msg">Identificando seu dispositivo...</p>

  <a href="#" class="btn hidden" id="fallback-btn">Baixar o App</a>

  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;

      var androidLink = "intent://play.google.com/store/apps/details?id=com.mcommerce.tray.brkagro&hl=pt_BR#Intent;scheme=https;package=BRK%20AGRO;action=baixar;component=;S.browser_fallback_url=https://play.google.com/store/apps/details?id=com.mcommerce.tray.brkagro&hl=pt_BR;end";
      var iosLink     = "https://apps.apple.com/br/app/brk-agro/id6446843494";
      var fallbackLink = "https://play.google.com/store/apps/details?id=com.mcommerce.tray.brkagro&hl=pt_BR";

      var msg     = document.getElementById("msg");
      var spinner = document.getElementById("spinner");
      var btn     = document.getElementById("fallback-btn");

      function redirect(url, label) {
        msg.textContent = "Redirecionando para " + label + "...";
        btn.href = url;
        btn.textContent = label;
        setTimeout(function () {
          spinner.classList.add("hidden");
          btn.classList.remove("hidden");
          window.location.href = url;
        }, 800);
      }

      if (/android/i.test(ua)) {
        redirect(androidLink, "Google Play");
      } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        redirect(iosLink, "App Store");
      } else {
        redirect(fallbackLink, "Google Play");
      }
    })();
  </script>

</body>
</html>
